<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Five Card Spread</title>

<link rel="stylesheet" href="static/css/styles.css">
<link rel="stylesheet" href="static/css/mobile-ui.css">

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gradient"
      x-data="fiveSpreadApp()"
      x-init="init()">


<header id="navbar" class="Navbar"></header>

<main class="ReadingPage">

    <h1 class="Hero-title">Five Card Spread</h1>

    <p class="Hero-description">
        Select exactly 5 cards from the spread.
    </p>


    <div class="card-grid">

        <template x-for="card in tiles" :key="card.id">

            <div class="CardWrapper">

                <div
                    class="tarot-card"
                    :class="{ 'selected': isSelected(card) }"
                    @click="toggle(card)"
                    @keydown.enter="toggle(card)"
                    tabindex="0"
                    role="button"
                >

                    <div class="tarot-inner">

                        <div class="tarot-front">
                            <img
                                src="static/images/tarot-back.jpg"
                                alt="Tarot card back"
                                class="CardImage"
                            >
                        </div>

                    </div>

                </div>

            </div>

        </template>

    </div>


    <div style="margin-top: 30px;">
        <button class="DrawButton" @click="reveal()">
            REVEAL
        </button>
    </div>

</main>


<script src="static/js/ui-views.js"></script>
<script src="static/js/fivespread.js"></script>

<script>
    renderNavbar();
</script>

</body>
</html>
